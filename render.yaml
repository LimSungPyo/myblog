# Render 블루프린트: 백엔드(FastAPI). DB는 Supabase(외부) 사용.
# Render 대시보드 > Blueprints 로 이 리포를 연결하면 서비스가 생성된다.
# DATABASE_URL 등 sync:false 값은 대시보드에서 직접 입력한다.
services:
  - type: web
    name: myblog-api
    runtime: docker
    rootDir: back_end
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # Supabase 연결 문자열을 대시보드에 입력
      - key: JWT_SECRET
        generateValue: true # Render가 랜덤 생성
      - key: ADMIN_USERNAME
        sync: false # 대시보드에서 직접 입력
      - key: ADMIN_PASSWORD
        sync: false # 대시보드에서 직접 입력
      - key: FRONTEND_ORIGIN
        sync: false # 배포된 Vercel 도메인 (예: https://myblog.vercel.app)
