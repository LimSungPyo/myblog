# Render 블루프린트: 백엔드(FastAPI) + 관리형 Postgres
# Render 대시보드 > Blueprints 에서 이 리포를 연결하면 자동 생성됩니다.
services:
  - type: web
    name: myblog-api
    runtime: docker
    rootDir: back_end
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: myblog-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false # 대시보드에서 직접 입력
      - key: ADMIN_PASSWORD
        sync: false # 대시보드에서 직접 입력
      - key: FRONTEND_ORIGIN
        sync: false # 배포된 Vercel 도메인 (예: https://myblog.vercel.app)

databases:
  - name: myblog-db
    plan: free
