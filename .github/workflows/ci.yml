name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ─────────────── 백엔드 (pytest) ───────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back_end
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/myblog_test
      JWT_SECRET: ci-test-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      FRONTEND_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest --cov=app --cov-report=term-missing

  # ─────────────── 프론트 (vitest + build) ───────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_end
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front_end/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build # 목 모드 빌드(백엔드 불필요)

  # ─────────────── E2E (Playwright) — PR에서만 ───────────────
  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myblog
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/myblog
      JWT_SECRET: ci-test-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      FRONTEND_ORIGIN: http://localhost:3000
      API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      E2E_ADMIN_USER: admin
      E2E_ADMIN_PASS: admin1234
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front_end/package-lock.json

      # 백엔드 준비 + 기동
      - name: Backend up
        working-directory: back_end
        run: |
          pip install -r requirements.txt
          alembic upgrade head
          python -m app.seed
          nohup uvicorn app.main:app --port 8000 > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 20); do curl -sf localhost:8000/health && break; sleep 1; done

      # 프론트 의존성 + Playwright 브라우저
      - name: Frontend deps
        working-directory: front_end
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # E2E 실행 (playwright webServer가 프론트 build+start)
      - name: Run E2E
        working-directory: front_end
        run: npm run test:e2e
