name: Keep Render Awake

# Render 무료 백엔드가 15분 무요청 시 잠드는 것을 막기 위해
# 10분마다 /health에 핑을 보낸다. (앱 코드 변경 불필요)
on:
  schedule:
    - cron: "*/10 * * * *" # 10분마다 (스케줄은 default 브랜치=main에서만 동작)
  workflow_dispatch: # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        run: |
          if [ -z "${{ vars.RENDER_HEALTH_URL }}" ]; then
            echo "RENDER_HEALTH_URL 변수가 아직 설정되지 않음 (Render 배포 후 설정)"
            exit 0
          fi
          curl -fsS --max-time 60 "${{ vars.RENDER_HEALTH_URL }}" \
            && echo "✅ 핑 성공" \
            || echo "⚠️ 핑 실패(서버 깨우는 중일 수 있음)"
