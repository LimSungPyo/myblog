# Ruff — Python 린터 + 포매터 (Black/isort/flake8 통합)
#   ruff format .          # 자동 정렬 (spotlessApply 격)
#   ruff format --check .  # 검사만 (CI)
#   ruff check --fix .     # 린트 + 자동 수정
[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# E/F: pycodestyle+pyflakes, I: isort, UP: pyupgrade, B: bugbear
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501", # 줄 길이는 포매터(ruff format)가 담당
    "B008", # FastAPI의 Depends()를 기본 인자로 쓰는 패턴 (의도된 것)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B017"] # 테스트에서 broad Exception 허용

[tool.ruff.format]
quote-style = "double"
